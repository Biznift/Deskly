# Base coturn config. Secrets / external IP are injected by entrypoint from env.

listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
use-auth-secret
realm=deskly.local

# Relay ports (narrow range for easier firewall / Docker publish if not using host net)
min-port=49152
max-port=49200

no-cli
no-tls
no-dtls
verbose
