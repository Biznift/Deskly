# Windows-friendly publish (use when host networking is unavailable).
# Still set EXTERNAL_IP in .env to your LAN or public IP.

services:
  coturn:
    image: coturn/coturn:4.6.2
    container_name: deskly-coturn
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
