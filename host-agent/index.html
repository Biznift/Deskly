<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deskly</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Deskly Host</p>
      <h1>Your ID</h1>
      <p class="id" id="hostId">·········</p>
      <p class="hint">Share this ID. You must Accept before anyone can see your screen.</p>
      <p class="status" id="status">Starting…</p>

      <label class="field">
        Signaling server
        <input id="signalUrl" value="ws://127.0.0.1:8080" spellcheck="false" />
      </label>
      <button type="button" id="reconnectBtn" class="ghost">Reconnect</button>

      <div class="incoming hidden" id="incoming">
        <p class="incoming-title">Incoming connection</p>
        <p class="hint">Someone wants to view your screen.</p>
        <div class="row">
          <button type="button" id="acceptBtn" class="primary">Accept</button>
          <button type="button" id="rejectBtn" class="danger">Reject</button>
        </div>
      </div>

      <div class="session hidden" id="session">
        <p class="banner">Screen sharing active</p>
        <p class="hint" id="sessionHint">A top-of-screen overlay stays visible with Disconnect.</p>
        <button type="button" id="disconnectBtn" class="danger">Disconnect</button>
      </div>
    </main>
  </body>
</html>
